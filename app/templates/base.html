<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ settings.app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/htmx.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Hub de operação</p>
        <h1><a href="/">{{ settings.app_name }}</a></h1>
        <nav class="topnav">
          <a href="/">Fila de jobs</a>
          <a href="/calendar">Agenda</a>
        </nav>
      </div>
      <div class="tailnet-box">
        <span>App local: {{ settings.app_host }}:{{ settings.app_port }}</span>
        <span>Tailnet: https://{{ settings.tailscale_hostname }}.{{ settings.tailnet_domain }}</span>
      </div>
    </header>
    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
