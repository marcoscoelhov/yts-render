{% extends "base.html" %}
{% block content %}
<section class="panel hub-settings-panel">
  <details class="settings-disclosure">
    <summary aria-label="Configurar prompt viral">
      <span class="settings-icon" aria-hidden="true">⚙</span>
      <span>Prompt viral</span>
    </summary>
    <form method="post" action="/hub/prompt" class="prompt-form">
      <div class="field full">
        <label for="viral_prompt_template">Template seguro</label>
        <textarea id="viral_prompt_template" name="viral_prompt_template" rows="13">{{ viral_prompt_template }}</textarea>
      </div>
      <div class="button-row prompt-actions">
        <button type="submit" name="action" value="save">Salvar prompt</button>
        <button type="submit" name="action" value="reset" class="ghost">Restaurar template</button>
      </div>
    </form>
  </details>
</section>

<section class="panel create-panel">
  <form method="post" action="/jobs" class="job-form">
    <input type="hidden" name="niche_id" value="{{ hub_defaults.niche_id }}">
    <div class="field">
      <label for="input_mode">Entrada</label>
      <select id="input_mode" name="input_mode">
        <option value="theme" selected>Tema</option>
        <option value="title">Titulo completo</option>
      </select>
    </div>
    <div class="field wide">
      <label for="seed_theme">Tema ou titulo</label>
      <input id="seed_theme" name="seed_theme" value="{{ hub_defaults.seed_theme }}" placeholder="Vazio = pesquisar tendências reais. Sugestão fallback: {{ hub_defaults.suggested_seed_theme }}">
    </div>
    <div class="field">
      <label for="target_duration_sec">Duracao</label>
      <input id="target_duration_sec" name="target_duration_sec" type="number" min="25" max="45" value="{{ hub_defaults.target_duration_sec }}">
    </div>
    <div class="field">
      <label for="tone">Tom</label>
      <select id="tone" name="tone">
        <option value="intrigante_direto" selected>Intrigante direto</option>
        <option value="surpresa_cientifica">Surpresa cientifica</option>
        <option value="mito_vs_realidade">Mito vs realidade</option>
        <option value="urgente_curioso">Urgente curioso</option>
        <option value="narrativo_misterioso">Narrativo misterioso</option>
        <option value="lista_viral">Lista viral</option>
      </select>
    </div>
    <div class="field">
      <label for="requested_angle">Angulo</label>
      <select id="requested_angle" name="requested_angle">
        <option value="auto" selected>Auto viral/SEO</option>
        <option value="habilidade biologica impossivel">Habilidade biologica impossivel</option>
        <option value="mecanismo oculto">Mecanismo oculto</option>
        <option value="comparacao inesperada">Comparacao inesperada</option>
        <option value="mito vs realidade">Mito vs realidade</option>
        <option value="erro comum">Erro comum</option>
        <option value="ranking/lista">Ranking/lista</option>
      </select>
    </div>
    <div class="field wide">
      <label for="custom_angle">Angulo customizado</label>
      <input id="custom_angle" name="custom_angle" placeholder="opcional; substitui o seletor">
    </div>
    <button type="submit">Criar job</button>
  </form>
</section>

<section class="panel filters-panel">
  <form class="filters-grid" hx-get="/jobs" hx-target="#jobs-table" hx-trigger="change, keyup delay:300ms">
    <input type="hidden" name="niche" value="curiosidades">
    <div class="field">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="">Todos</option>
        {% for value in ["queued","running","script_quality_failed","scene_plan_quality_failed","asset_quality_failed","subtitle_quality_failed","render_quality_failed","monetization_review","blocked_for_monetization","ready_for_upload","approved_for_publish","published","approved","rejected","failed"] %}
        <option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ value }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field wide">
      <label for="search">Busca</label>
      <input id="search" name="search" value="{{ filters.search }}" placeholder="job_id ou tema">
    </div>
    <div class="field">
      <label for="fallback">Fallback</label>
      <select id="fallback" name="fallback">
        <option value="">Todos</option>
        <option value="yes" {% if filters.fallback == "yes" %}selected{% endif %}>Sim</option>
      </select>
    </div>
    <div class="field">
      <label for="review">Review</label>
      <select id="review" name="review">
        <option value="">Todos</option>
        <option value="approved" {% if filters.review == "approved" %}selected{% endif %}>approved</option>
        <option value="rejected" {% if filters.review == "rejected" %}selected{% endif %}>rejected</option>
      </select>
    </div>
  </form>
</section>

<section class="panel">
  <div id="jobs-table" hx-get="/jobs?status={{ filters.status }}&search={{ filters.search }}&fallback={{ filters.fallback }}&review={{ filters.review }}" hx-trigger="load, every 5s">
    {% include "jobs_table.html" %}
  </div>
</section>
{% endblock %}
